<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automatisierbar · Verlauf & Trends</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/cockpit.css">
</head>
<body data-page="verlauf">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <div><h1>Verlauf &amp; Trends</h1><div class="sub">Wie sich der Agent über die Sessions verbessert</div></div>
    </header>
    <div class="content">
      <div class="kpis" id="tiles"></div>

      <div class="section-h">Performance-Trend über Sessions <span class="dim" style="text-transform:none;letter-spacing:0;font-weight:400">· gestrichelt = neue Skript-Version</span></div>
      <div class="card chart-wrap"><div id="chart"></div></div>

      <div class="section-h">Sessions</div>
      <div id="history"></div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)app.close()">
  <div class="modal" style="max-width:560px">
    <span class="x" onclick="app.close()">×</span>
    <div id="mTitle" style="font-weight:600;font-size:15px;margin-bottom:6px"></div>
    <div class="baro-bar" id="mBaro" style="margin:12px 0 10px"></div>
    <div class="chart-legend" id="mLegend" style="margin-bottom:14px"></div>
    <div id="mKv"></div>
  </div>
</div>

<script src="/static/cockpit-shell.js"></script>
<script>
const BUCKETS = [
  ["hot","Termin / Hot","#15C87A"],
  ["followup","Follow-up","#EAB308"],
  ["cold","Cold","#F97316"],
  ["hangup","Aufgelegt","#EF4444"],
  ["noanswer","Nicht erreicht","#6B7280"],
];
const SERIES = [
  {key:"connect_rate", color:"#38BDF8", label:"Verbindungsrate"},
  {key:"hot_rate",     color:"#15C87A", label:"Hot-Rate"},
  {key:"followup_rate",color:"#EAB308", label:"Follow-up-Rate"},
];
const pct = v => Shell.pct(v);
const esc = s => Shell.esc(s);

const app = {
  sessions: [],

  async load(){
    let r; try{ r=await fetch("/api/cockpit/sessions",{headers:Shell.hdr()});}catch(e){return Shell.toast("Netzwerkfehler");}
    if(r.status===401)return Shell.toast("Kein/ungültiger API-Key (?key=…)");
    const d=await r.json();
    if(d.error)Shell.toast(d.error);
    this.sessions = (d.sessions||[]).filter(s=>s.fired>0);
    this.renderTiles(); this.renderChart(); this.renderHistory();
  },

  renderTiles(){
    const ss=this.sessions;
    const calls=ss.reduce((a,s)=>a+(s.fired||0),0);
    const cost=ss.reduce((a,s)=>a+(s.cost_chf||0),0);
    const totHot=ss.reduce((a,s)=>a+((s.barometers||{}).hot||0),0);
    const avgHot=calls? totHot/calls : 0;
    const cards=[
      {lbl:"Sessions", val:ss.length, spark:null},
      {lbl:"Calls total", val:calls, spark:ss.map(s=>s.fired), color:"#15C87A"},
      {lbl:"Ø Hot-Rate", val:pct(avgHot), spark:ss.map(s=>s.hot_rate), color:"#5EE0A6"},
      {lbl:"Kosten CHF", val:cost.toFixed(2), spark:ss.map(s=>s.cost_chf), color:"#F97316"},
    ];
    document.getElementById("tiles").innerHTML = cards.map(c=>
      `<div class="stat"><div class="lbl">${c.lbl}</div><div class="big num">${c.val}</div>
        <div class="foot">${c.spark&&c.spark.length>1?`<div class="spark" style="max-width:none">${Shell.sparkline(c.spark,{color:c.color})}</div>`:'<span></span>'}</div></div>`).join("");
  },

  renderChart(){
    const ss=this.sessions, el=document.getElementById("chart");
    if(!ss.length){ el.innerHTML='<div class="empty"><div class="ico">📈</div>Noch keine Sessions. Starte einen Batch im Live-Cockpit — danach erscheint hier der Trend.</div>'; return; }
    const svg=Shell.lineChart({
      rows:ss, x:s=>Shell.dateShort(s.date), yMax:1, yFmt:v=>Math.round(v*100)+"%",
      series:SERIES.map(s=>({get:r=>r[s.key]||0, color:s.color, label:s.label})),
      marker:(s,i)=> (i>0 && s.script_version && s.script_version!==ss[i-1].script_version) ? s.script_version : null,
    });
    el.innerHTML = svg + Shell.legend(SERIES);
  },

  renderHistory(){
    const ss=this.sessions.slice().reverse(), el=document.getElementById("history");
    if(!ss.length){ el.innerHTML='<div class="card empty">Noch keine Sessions.</div>'; return; }
    el.innerHTML = ss.map((s)=>{
      const b=s.barometers||{}, tot=BUCKETS.reduce((a,[k])=>a+(b[k]||0),0)||1;
      const segs=BUCKETS.map(([k,,c])=> b[k]?`<div class="baro-seg" style="width:${b[k]/tot*100}%;background:${c}"></div>`:"").join("");
      const stc={done:"stat-done",stopped:"stat-stopped",error:"stat-error"}[s.status]||"stat-done";
      const idx=this.sessions.indexOf(s);
      return `<div class="shist" onclick="app.detail(${idx})">
        <div class="srow">
          <div><b>${(s.date||"").slice(0,10)}</b> · ${esc(s.branche||"Alle ICP")}${s.script_version?`<span class="ver">${esc(s.script_version)}</span>`:""}</div>
          <div class="muted">${s.fired} Calls · <span class="num">${(s.cost_chf||0).toFixed(2)}</span> CHF <span class="stat-pill ${stc}">${esc(s.status||"")}</span></div>
        </div>
        <div class="baro-bar">${segs}</div>
        <div class="srates">
          <span>Verbunden <b>${pct(s.connect_rate)}</b></span>
          <span>Hot <b style="color:var(--green-soft)">${pct(s.hot_rate)}</b></span>
          <span>Follow-up <b style="color:#facc15">${pct(s.followup_rate)}</b></span>
        </div>
      </div>`;
    }).join("");
  },

  detail(i){
    const s=this.sessions[i]; if(!s)return;
    document.getElementById("overlay").classList.add("show");
    document.getElementById("mTitle").textContent=`${(s.date||"").slice(0,10)} · ${s.branche||"Alle ICP"} · ${s.script_version||""}`;
    const b=s.barometers||{}, tot=BUCKETS.reduce((a,[k])=>a+(b[k]||0),0)||1;
    document.getElementById("mBaro").innerHTML=BUCKETS.map(([k,,c])=> b[k]?`<div class="baro-seg" style="width:${b[k]/tot*100}%;background:${c}"></div>`:"").join("");
    document.getElementById("mLegend").innerHTML=BUCKETS.map(([k,l,c])=>`<span class="lg"><span class="dot" style="background:${c}"></span>${l} <b style="margin-left:3px;color:var(--text)">${b[k]||0}</b></span>`).join("");
    const kv=[
      ["Status", s.status||""],
      ["Calls gewählt", s.fired],
      ["Verbunden", `${s.connected} (${pct(s.connect_rate)})`],
      ["Hot / Termin", `${b.hot||0} (${pct(s.hot_rate)})`],
      ["Follow-ups", `${b.followup||0} (${pct(s.followup_rate)})`],
      ["Kosten", `${(s.cost_chf||0).toFixed(2)} CHF`],
      ["Skript-Version", s.script_version||"—"],
    ];
    document.getElementById("mKv").innerHTML=kv.map(([k,v])=>`<div class="kv"><span class="k">${k}</span><span class="num">${esc(v)}</span></div>`).join("");
  },
  close(){ document.getElementById("overlay").classList.remove("show"); },
};
Shell.ready(()=>app.load());
</script>
</body>
</html>
