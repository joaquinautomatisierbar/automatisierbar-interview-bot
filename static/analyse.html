<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automatisierbar · Analyse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/cockpit.css">
<style>
  #lower{grid-template-columns:1fr 1fr}
  @media(max-width:820px){#lower{grid-template-columns:1fr}}
</style>
</head>
<body data-page="analyse">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <header class="topbar">
      <div><h1>Analyse</h1><div class="sub">Beste Anrufzeit · Top-Probleme · Schmerzscore</div></div>
      <div class="topbar-actions">
        <div class="field" style="width:168px"><label>Branche</label>
          <select id="branche">
            <option value="">Alle ICP</option>
            <option>Treuhand</option><option>Immobilien</option><option>Rechtsbranche</option>
            <option>Finanz</option><option>Coaching / Beratung</option><option>Marketing / Agentur</option>
            <option>Architektur</option><option>Unternehmensberatung</option>
          </select></div>
        <div class="seg" id="periodSeg">
          <button data-d="7">7 T</button>
          <button data-d="30" class="on">30 T</button>
          <button data-d="90">90 T</button>
          <button data-d="0">Alle</button>
        </div>
      </div>
    </header>
    <div class="content">
      <div class="kpis" id="kpis"></div>

      <div class="section-h" style="justify-content:space-between;align-items:center">
        <span>Beste Anrufzeit <span class="dim" style="text-transform:none;letter-spacing:0;font-weight:400">· Wochentag × Stunde · Europe/Zürich</span></span>
        <div class="seg" id="metricSeg">
          <button data-m="calls" class="on">Volumen</button>
          <button data-m="connect">Connect-Rate</button>
          <button data-m="hot">Hot-Rate</button>
        </div>
      </div>
      <div class="card chart-wrap"><div id="heatmap"></div>
        <div class="hm-scale"><span>weniger</span><span class="grad"></span><span>mehr</span></div>
      </div>

      <div class="grid" id="lower" style="margin-top:18px">
        <div class="card">
          <div class="section-h" style="margin:0 0 14px">Top-Probleme <span class="dim" style="text-transform:none;letter-spacing:0;font-weight:400">· ⌀ = Schmerzscore</span></div>
          <div id="problems"></div>
        </div>
        <div class="card chart-wrap">
          <div class="section-h" style="margin:0 0 14px">Schmerzscore-Verteilung</div>
          <div id="schmerz"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/static/cockpit-shell.js"></script>
<script>
const DOW = ["Mo","Di","Mi","Do","Fr","Sa","So"];   // server uses Python weekday(): Mon=0..Sun=6
const pad2 = n => String(n).padStart(2,"0");

const app = {
  periodDays:30, branche:"", metric:"calls", data:null,

  async load(){
    document.querySelectorAll("#periodSeg button").forEach(b=>b.onclick=()=>{ this.periodDays=+b.dataset.d; document.querySelectorAll("#periodSeg button").forEach(x=>x.classList.toggle("on",x===b)); this.fetch(); });
    document.querySelectorAll("#metricSeg button").forEach(b=>b.onclick=()=>{ this.metric=b.dataset.m; document.querySelectorAll("#metricSeg button").forEach(x=>x.classList.toggle("on",x===b)); this.renderHeatmap(); });
    document.getElementById("branche").onchange=e=>{ this.branche=e.target.value; this.fetch(); };
    this.fetch();
  },

  async fetch(){
    const q=new URLSearchParams({days:this.periodDays}); if(this.branche)q.set("branche",this.branche);
    let r; try{ r=await fetch("/api/cockpit/insights?"+q.toString(),{headers:Shell.hdr()});}catch(e){ return Shell.toast("Netzwerkfehler"); }
    if(r.status===401) return Shell.toast("Kein/ungültiger API-Key (?key=…)");
    this.data=await r.json();
    this.render();
  },

  render(){
    if(!this.data || !this.data.total_calls){
      document.getElementById("kpis").innerHTML=`<div class="empty" style="grid-column:1/-1"><div class="ico">🔭</div>Noch keine erfassten Calls in diesem Zeitraum.<br><span class="dim">Die Voice-Calls-Daten füllen sich, sobald Batches laufen (oder per Backfill).</span></div>`;
      ["heatmap","problems","schmerz"].forEach(id=>document.getElementById(id).innerHTML=`<div class="empty">Keine Daten.</div>`);
      return;
    }
    this.renderKpis(); this.renderHeatmap(); this.renderProblems(); this.renderSchmerz();
  },

  renderKpis(){
    const k=this.data.kpis||{}, n=this.data.total_calls||0;
    const cards=[
      ["Calls erfasst", n],
      ["Interview-Quote", Shell.pct(k.interview_completion_rate)],
      ["Zahlung erwähnt", Shell.pct(k.payment_rate)],
      ["CHF pro Hot", k.chf_per_hot!=null? k.chf_per_hot.toFixed(2):"—"],
    ];
    document.getElementById("kpis").innerHTML=cards.map(([l,v])=>
      `<div class="stat"><div class="lbl">${l}</div><div class="big num">${v}</div><div class="foot"></div></div>`).join("");
  },

  renderHeatmap(){
    if(!this.data) return;
    const tod=this.data.time_of_day||[], el=document.getElementById("heatmap");
    if(!tod.length){ el.innerHTML=`<div class="empty">Keine Daten in diesem Zeitraum.</div>`; return; }
    const grid={}; tod.forEach(c=>grid[c.dow+"_"+c.hour]=c);
    const metric=this.metric;
    const val=c=> metric==="calls"? c.calls : metric==="connect"? (c.calls? c.connected/c.calls:0) : (c.calls? c.hot/c.calls:0);
    let scaleMax=0; tod.forEach(c=>{ const v=val(c); if(v>scaleMax)scaleMax=v; }); scaleMax=scaleMax||1;
    let html=`<div class="hm-corner"></div>`;
    for(let h=0;h<24;h++) html+=`<div class="hm-hd">${h%3===0?h:""}</div>`;
    for(let d=0;d<7;d++){
      html+=`<div class="hm-day">${DOW[d]}</div>`;
      for(let h=0;h<24;h++){
        const c=grid[d+"_"+h];
        if(!c||!c.calls){ html+=`<div class="hm-cell"></div>`; continue; }
        const a=Math.max(0.08, val(c)/scaleMax);
        const tip=`${DOW[d]} ${pad2(h)}:00 · ${c.calls} Calls · ${c.connected} verbunden · ${c.hot} hot`;
        html+=`<div class="hm-cell" style="background:rgba(21,200,122,${a.toFixed(2)})" data-tip="${Shell.esc(tip)}"></div>`;
      }
    }
    el.innerHTML=`<div class="heatmap">${html}</div>`;
  },

  renderProblems(){
    const tp=this.data.top_problems||[], el=document.getElementById("problems");
    if(!tp.length){ el.innerHTML=`<div class="empty">Noch keine Probleme erfasst.</div>`; return; }
    const rows=tp.map(p=>({name:p.problem, value:p.count, label:p.avg_schmerz!=null?`${p.count} · ⌀${p.avg_schmerz}`:`${p.count}`}));
    el.innerHTML=Shell.hbars(rows);
  },

  renderSchmerz(){
    const s=this.data.schmerzscore||{}, el=document.getElementById("schmerz");
    const counts=[1,2,3,4,5].map(i=>s[String(i)]||0);
    const max=Math.max(1,...counts);
    let tot=0,sum=0; counts.forEach((v,i)=>{ tot+=v; sum+=(i+1)*v; });
    if(!tot){ el.innerHTML=`<div class="empty">Noch keine Bewertungen.</div>`; return; }
    const bars=counts.map((v,i)=>`<div class="sz-col">
      <div class="sz-bar" style="height:${Math.round(v/max*100)}%" data-tip="Schmerzscore ${i+1}: ${v}"></div>
      <div class="sz-lbl">${i+1}</div></div>`).join("");
    el.innerHTML=`<div class="sz-wrap">${bars}</div>
      <div class="dim" style="text-align:center;margin-top:12px;font-size:12px">Ø Schmerzscore <b style="color:var(--text)">${(sum/tot).toFixed(1)}</b> · ${tot} bewertet</div>`;
  },
};
Shell.ready(()=>app.load());
</script>
</body>
</html>
