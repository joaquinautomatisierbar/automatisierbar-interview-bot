services:
  - type: web
    name: automatisierbar-pdf-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --timeout 120
    envVars:
      - key: PDF_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NOTION_API_KEY
        sync: false
      - key: NOTION_DATABASE_ID
        sync: false
      - key: NOTION_LINKEDIN_DB_ID
        sync: false
      - key: NOTION_LEADS_DB_ID
        sync: false
